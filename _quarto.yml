project:
  type: website
  resources:
    - "demo/"

website:
  favicon: "https://migue-rc.github.io/favicon.ico"
  # Creates a top navbar so users can always get back to your Hub
  site-url: "https://dmigue-rc.github.io/lung-cancer-risk"
  description: "An interactive, end-to-end data science project demonstrating the lifecycle of a machine learning model from exploratory data analysis (EDA) to a fully deployed frontend application."
  open-graph: true
  twitter-card: true
  image: "assets/hero.jpg"
  navbar:
    background: primary
    left:
      - text: "← Back to Main"
        href: "https://migue-rc.github.io"

# Engine configuration (Moved out of format block)
execute:
  warning: false # Hides Python deprecation/info warnings in the final output

format:
  html:
    # Loads the base theme, then any local SCSS variables
    theme:
      light: [sketchy, custom.scss]
      dark: [sketchy, sketchy-dark.scss]
    # Injects your live, remote CSS file for instant global updates
    highlight-style: 
      light: github
      dark: monokai
    include-in-header: 
      text: |
        <link rel="stylesheet" href="https://migue-rc.github.io/brand-theme.css">
    css: local-style.css
    toc: true
    code-fold: true